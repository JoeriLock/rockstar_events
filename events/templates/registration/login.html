{% extends "base.html" %}
{% block title %}Sign in — Rockstar Events{% endblock %}
{% block content %}
<h1>Rockstar Events</h1>
<div class="card">
  <form method="post">
    {% csrf_token %}
    <label>
      <span>Username</span>
      <input name="username" autofocus required autocomplete="username">
    </label>
    <label>
      <span>Password</span>
      <input name="password" type="password" required autocomplete="current-password">
    </label>
    {% if error %}
      <p style="color:#c00; margin-bottom:1rem;">{{ error }}</p>
    {% endif %}
    <button type="submit">Sign in</button>
  </form>
</div>
<p style="margin-top:1rem; font-size:.875rem; color:#666;">
  No account yet? <a href="{% url 'register' %}">Register</a>
</p>
{% endblock %}
