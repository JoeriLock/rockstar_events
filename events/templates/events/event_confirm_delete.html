{% extends "base.html" %}
{% block title %}Delete {{ event.title }} — Rockstar Events{% endblock %}
{% block content %}
<a class="btn btn-secondary" href="{% url 'event_detail' event.pk %}">&larr; Back to event</a>
<h1 style="margin-top:.75rem;">Delete event</h1>
<div class="card">
  <p>Are you sure you want to delete <strong>{{ event.title }}</strong>? This cannot be undone.</p>
  <div style="display:flex; gap:.75rem; margin-top:1.25rem;">
    <form method="post">
      {% csrf_token %}
      <button class="danger" type="submit">Yes, delete</button>
    </form>
    <a class="btn" href="{% url 'event_detail' event.pk %}" style="background:#eee; color:#232323;">Cancel</a>
  </div>
</div>
{% endblock %}
