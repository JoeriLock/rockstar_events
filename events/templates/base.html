<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Rockstar Events{% endblock %}</title>
  <style>
    :root { --yellow: #FFE000; --dark: #232323; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: var(--dark); }
    nav { background: var(--dark); color: #fff; padding: .75rem 1.5rem; display: flex; align-items: center; gap: 1rem; }
    nav a { color: var(--yellow); text-decoration: none; font-weight: 600; }
    nav a:hover { text-decoration: underline; }
    nav span { color: #fff; }
    nav .spacer { flex: 1; }
    main { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    h1 { margin-bottom: 1.25rem; }
    h2 { margin: 1.5rem 0 .75rem; }
    .card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 1.25rem; margin-bottom: .75rem; }
    .card h3 { margin-bottom: .25rem; }
    .card h3 a { color: inherit; text-decoration: none; }
    .card h3 a:hover { text-decoration: underline; }
    .meta { color: #666; font-size: .875rem; margin-top: .25rem; }
    label { display: block; margin-bottom: 1rem; font-weight: 500; }
    label span { display: block; margin-bottom: .25rem; }
    input, textarea, select { width: 100%; padding: .5rem .75rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; font-family: inherit; }
    input:focus, textarea:focus, select:focus { outline: 2px solid var(--yellow); border-color: var(--yellow); }
    button, .btn { display: inline-block; padding: .5rem 1.25rem; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; background: var(--yellow); color: var(--dark); font-weight: 600; text-decoration: none; }
    button:hover, .btn:hover { background: #f0d000; }
    button.danger, .btn.danger { background: #c00; color: #fff; }
    button.danger:hover, .btn.danger:hover { background: #900; }
    .btn-secondary { background: #fff; color: var(--dark); border: 1px solid #ccc; }
    .btn-secondary:hover { background: #f0f0f0; }
    button:disabled { background: #ccc; color: #888; cursor: not-allowed; }
    .messages { margin-bottom: 1rem; }
    .messages li { list-style: none; background: #fef9c3; border: 1px solid #fde047; padding: .5rem .75rem; border-radius: 6px; margin-bottom: .5rem; }
  </style>
</head>
<body>
  <nav>
    <a href="/">Rockstar Events</a>
    <span class="spacer"></span>
    {% if user.is_authenticated %}
      <a href="{% url 'my_events' %}" style="color:#fff; font-weight:400;">My events</a>
      <span style="color:#fff;">{{ user.get_full_name|default:user.username }}</span>
      <a href="{% url 'poc_logout' %}" style="color:#aaa; font-weight:400;">Log out</a>
    {% else %}
      <a href="{% url 'poc_login' %}">Sign in</a>
    {% endif %}
  </nav>
  <main>
    {% if messages %}
      <ul class="messages">
        {% for msg in messages %}<li>{{ msg }}</li>{% endfor %}
      </ul>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
